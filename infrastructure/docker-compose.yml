# ============================================================================
# Turkey Food Supply Chain Transparency Engine — local ingestion stack
#   Services: Zookeeper · Kafka · Kafka-UI · Apache NiFi · MinIO
#   One-shot init: kafka-setup (creates topics) · minio-setup (creates buckets)
#
# Quick start:
#   cd infrastructure && ./setup.sh
#
# Or by hand:
#   cd infrastructure && docker compose up -d
#
# URLs (after startup):
#   NiFi       http://localhost:8080/nifi   (open, no auth — HTTP mode)
#   Kafka UI   http://localhost:8090
#   MinIO      http://localhost:9001        (admin / admin12345)
#   Kafka      localhost:29092              (host-facing listener)
# ============================================================================

version: "3.8"

networks:
  bdp:
    driver: bridge

volumes:
  zk-data:
  kafka-data:
  nifi-conf:
  nifi-content:
  nifi-db:
  nifi-flowfile:
  nifi-provenance:
  nifi-state:
  nifi-logs:
  minio-data:

services:

  # --------------------------------------------------------------------------
  # ZooKeeper — coordination service for Kafka brokers (pre-KRaft setup)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [bdp]
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # Kafka broker — transport plane for all raw_* topics
  #
  # Dual-listener setup:
  #   PLAINTEXT://kafka:9092      for container-to-container (NiFi, Flink, ...)
  #   PLAINTEXT_HOST://:29092     for host-side producers/consumers
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    networks: [bdp]
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${HOST_IP:-localhost}:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 20

  # --------------------------------------------------------------------------
  # Kafka-UI — web console for browsing topics / partitions / messages
  # --------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on: [kafka]
    networks: [bdp]
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: bdp-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # --------------------------------------------------------------------------
  # kafka-setup — one-shot init container that creates all raw_* topics
  # Matches docker-setup.md §3 + HW_NiFi_Kafka.md §1.4
  # --------------------------------------------------------------------------
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on: [kafka]
    networks: [bdp]
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo "[kafka-setup] waiting for kafka to be reachable..."
        for i in $$(seq 1 60); do
          if kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1; then
            echo "[kafka-setup] kafka is up"; break
          fi
          sleep 3
        done
        for t in raw_market_prices raw_hal_prices raw_weather raw_gdelt \
                 raw_epias raw_tcmb raw_akaryakit; do
          kafka-topics --bootstrap-server kafka:9092 \
                       --create --if-not-exists \
                       --topic "$$t" --partitions 6 --replication-factor 1
        done
        echo "[kafka-setup] topics ready:"
        kafka-topics --bootstrap-server kafka:9092 --list

  # --------------------------------------------------------------------------
  # Apache NiFi — ingestion plane (HTTP mode for easy local access)
  #   Login: none (HTTP mode disables single-user auth — local dev only)
  #
  # The project's flow template is mounted read-only at:
  #   /opt/nifi/templates/nifi_flow_template.xml
  # Inside NiFi: Operate palette → Upload Template → pick that file.
  # --------------------------------------------------------------------------
  nifi:
    image: apache/nifi:1.25.0
    container_name: nifi
    networks: [bdp]
    ports:
      - "8080:8080"
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
      NIFI_WEB_HTTP_HOST: "0.0.0.0"
      # Comma-separated Host-header whitelist — include localhost AND the
      # public IP/hostname(s) so remote browsers can reach /nifi.
      NIFI_WEB_PROXY_HOST: "localhost:8080,${HOST_IP:-localhost}:8080,${HOST_DNS:-localhost}:8080"
      NIFI_CLUSTER_IS_NODE: "false"
      NIFI_SENSITIVE_PROPS_KEY: "bdp-food-supply-chain-2026-sensitivekey"
      NIFI_JVM_HEAP_INIT: "1g"
      NIFI_JVM_HEAP_MAX: "2g"
    volumes:
      - nifi-conf:/opt/nifi/nifi-current/conf
      - nifi-content:/opt/nifi/nifi-current/content_repository
      - nifi-db:/opt/nifi/nifi-current/database_repository
      - nifi-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi-state:/opt/nifi/nifi-current/state
      - nifi-logs:/opt/nifi/nifi-current/logs
      - ./nifi_flow_template.xml:/opt/nifi/templates/nifi_flow_template.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nifi/"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 90s

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object store (Bronze / Silver / Gold buckets)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: minio
    networks: [bdp]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # minio-setup — one-shot init that creates bronze/silver/gold buckets
  # --------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: minio-setup
    depends_on: [minio]
    networks: [bdp]
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 admin admin12345
        for b in bronze silver gold; do
          mc mb --ignore-existing local/$$b
        done
        echo "[minio-setup] bronze/silver/gold buckets ready"
