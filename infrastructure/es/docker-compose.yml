version: "3.8"

# Tek-node Elasticsearch + Kibana — EC2'da self-hosted demo için.
# Production değil; xpack security kapalı, TLS yok. Sadece güvenli SG arkasında çalıştır.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: gidaradar-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1500m -Xmx1500m"
      - cluster.name=gidaradar
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      # localhost-only: ES'i internete AÇMA. Kibana container-network'ten,
      # index_to_es localhost'tan erişir. 9200'ü dışa açmak = ransomware botu daveti.
      - "127.0.0.1:9200:9200"
    networks:
      - gidaradar-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: gidaradar-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=http://localhost:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    networks:
      - gidaradar-net

volumes:
  es-data:

networks:
  gidaradar-net:
    driver: bridge
